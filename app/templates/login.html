<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kirish — Sahovat Shifo Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container" style="max-width: 420px; margin-top: 12vh;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-1 text-primary">Sahovat Shifo</h4>
        <p class="text-muted mb-4">Admin panelga kirish</p>
        {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
          <div class="mb-3">
            <label class="form-label">Parol</label>
            <input type="password" name="password" class="form-control" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary w-100">Kirish</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
