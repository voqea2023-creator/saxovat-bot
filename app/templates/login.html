<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kirish — Sahovat Shifo Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#29354d 0%,#1b2236 100%); font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    .login{ width:360px; background:#fff; border-radius:14px; padding:30px 28px; box-shadow:0 18px 50px rgba(0,0,0,.3); }
    .logo{ width:56px; height:56px; border-radius:50%; background:#D11E26; color:#fff; font-weight:800;
      display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:18px; }
    .btn-primary{ background:#2c8af8; border-color:#2c8af8; }
    .btn-primary:hover{ background:#1f7be8; border-color:#1f7be8; }
  </style>
</head>
<body>
  <div class="login">
    <div class="logo">S&amp;S</div>
    <h5 class="text-center mb-1">Sahovat Shifo</h5>
    <p class="text-center text-muted mb-4" style="font-size:13px">Admin panelga kirish</p>
    {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <div class="mb-3">
        <label class="form-label">Parol</label>
        <input type="password" name="password" class="form-control" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">Kirish</button>
    </form>
  </div>
</body>
</html>
