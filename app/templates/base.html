<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}Admin{% endblock %} — Sahovat Shifo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --bx-sidebar:#29354d; --bx-sidebar-2:#222d42; --bx-accent:#2c8af8;
      --bx-text:#c7d0e0; --bx-bg:#eef2f6; --bx-card:#ffffff; --bx-border:#e3e8ee; --bx-title:#2a3140;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bx-bg); font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#2a3140; }
    .layout{ display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar{ width:230px; flex:0 0 230px; background:var(--bx-sidebar); color:var(--bx-text);
      display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
    .brand{ padding:18px 18px; font-weight:700; color:#fff; font-size:16px;
      border-bottom:1px solid rgba(255,255,255,.07); display:flex; align-items:center; gap:8px; }
    .brand .dot{ width:26px; height:26px; border-radius:50%; background:#D11E26; color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; }
    .nav{ padding:10px 0; flex:1; overflow-y:auto; }
    .nav-item{ display:flex; align-items:center; gap:11px; padding:11px 18px; color:var(--bx-text);
      text-decoration:none; font-size:14.5px; border-left:3px solid transparent; }
    .nav-item .ic{ width:20px; text-align:center; opacity:.9; }
    .nav-item:hover{ background:rgba(255,255,255,.06); color:#fff; }
    .nav-item.active{ background:rgba(44,138,248,.16); color:#fff; border-left-color:var(--bx-accent); }
    .nav-foot{ border-top:1px solid rgba(255,255,255,.07); }

    /* Main */
    .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
    .topbar{ background:#fff; border-bottom:1px solid var(--bx-border); padding:14px 22px;
      display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .topbar h1{ font-size:18px; font-weight:600; margin:0; color:var(--bx-title); }
    .topbar .who{ font-size:13px; color:#8a94a6; }
    .content{ padding:22px; }

    /* Cards / tables in Bitrix tone */
    .card{ border:1px solid var(--bx-border); border-radius:10px; box-shadow:0 1px 2px rgba(16,30,54,.06); }
    .stat{ background:#fff; border:1px solid var(--bx-border); border-radius:10px; padding:16px; text-align:center; }
    .stat .num{ font-size:30px; font-weight:700; color:var(--bx-title); line-height:1; }
    .stat .lbl{ font-size:12.5px; color:#8a94a6; margin-top:6px; }
    .btn-primary{ background:var(--bx-accent); border-color:var(--bx-accent); }
    .btn-primary:hover{ background:#1f7be8; border-color:#1f7be8; }
    .table thead th{ background:#f7f9fb; color:#6b7689; font-weight:600; font-size:12.5px;
      text-transform:uppercase; letter-spacing:.3px; }
    a{ color:var(--bx-accent); }

    @media (max-width: 760px){
      .sidebar{ width:64px; flex-basis:64px; }
      .brand span.t, .nav-item span.t{ display:none; }
      .nav-item{ justify-content:center; }
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="dot">S&amp;S</span><span class="t">Sahovat Shifo</span></div>
      <nav class="nav">
        <a class="nav-item {{ 'active' if active=='reyting' }}" href="/admin"><span class="ic">📊</span><span class="t">Reyting</span></a>
        <a class="nav-item {{ 'active' if active=='crm' }}" href="/admin/crm"><span class="ic">🗂️</span><span class="t">CRM</span></a>
        <a class="nav-item {{ 'active' if active=='results' }}" href="/admin/results"><span class="ic">📄</span><span class="t">Natijalar</span></a>
        <a class="nav-item {{ 'active' if active=='rewards' }}" href="/admin/rewards"><span class="ic">🎁</span><span class="t">Chegirmalar</span></a>
        <a class="nav-item {{ 'active' if active=='broadcast' }}" href="/admin/broadcast"><span class="ic">📢</span><span class="t">Broadcast</span></a>
      </nav>
      <div class="nav-foot">
        <a class="nav-item" href="/admin/logout"><span class="ic">↩️</span><span class="t">Chiqish</span></a>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <h1>{% block header %}{% endblock %}</h1>
        <span class="who">Sahovat Shifo — Admin</span>
      </header>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
