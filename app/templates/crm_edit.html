<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kartani tahrirlash — Sahovat Shifo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand navbar-dark" style="background:#D11E26">
    <div class="container-fluid">
      <span class="navbar-brand">🏥 Sahovat Shifo — Admin</span>
      <div class="navbar-nav">
        <a class="nav-link" href="/admin/crm">← CRM</a>
      </div>
    </div>
  </nav>

  <div class="container py-4" style="max-width: 640px;">
    <h5 class="mb-3">Kartani tahrirlash</h5>
    <div class="card card-body">
      <form method="post" action="/admin/crm/{{ lead.id }}/edit" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Ism</label>
          <input name="name" class="form-control" value="{{ lead.name or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefon</label>
          <input name="phone" class="form-control" value="{{ lead.phone or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Xizmat</label>
          <input name="service" class="form-control" value="{{ lead.service or '' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label">Bosqich</label>
          <select name="status" class="form-select">
            {% for key, label in stages %}
            <option value="{{ key }}" {% if lead.status == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Keyingi aloqa</label>
          <input type="date" name="next_contact" class="form-control"
                 value="{{ lead.next_contact.isoformat() if lead.next_contact else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Izoh</label>
          <textarea name="note" class="form-control" rows="3">{{ lead.note or '' }}</textarea>
        </div>
        <div class="col-12 d-flex justify-content-between">
          <button class="btn btn-danger">Saqlash</button>
        </div>
      </form>
    </div>

    <form method="post" action="/admin/crm/{{ lead.id }}/delete" class="mt-3"
          onsubmit="return confirm('Kartani o’chirasizmi?');">
      <button class="btn btn-outline-danger btn-sm">🗑 Kartani o'chirish</button>
    </form>
  </div>
</body>
</html>
